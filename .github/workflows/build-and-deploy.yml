name: build-and-deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  BASE_URL: /${{ github.event.repository.name }}
  NODE_OPTIONS: '--max-old-space-size=12288'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # ── Job 1a: Execute notebooks ───────────────────────────────────────
  execute-notebooks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Cache executed notebooks
      uses: actions/cache@v4
      id: nb-cache
      with:
        path: notebooks/
        key: notebooks-${{ hashFiles('notebooks/**/*.ipynb', 'requirements.txt') }}

    - name: Set up Python
      if: steps.nb-cache.outputs.cache-hit != 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      if: steps.nb-cache.outputs.cache-hit != 'true'
      run: pip install -r requirements.txt

    - name: Execute notebooks
      if: steps.nb-cache.outputs.cache-hit != 'true'
      run: |
        for nb in notebooks/*.ipynb; do
          [ -f "$nb" ] || continue
          echo "Executing $nb ..."
          jupyter execute "$nb" --inplace || echo "WARNING: $nb failed"
        done

    - name: Upload executed notebooks
      uses: actions/upload-artifact@v4
      with:
        name: executed-notebooks
        path: notebooks/
        retention-days: 1

  # ── Job 1b: Build myst-theme (runs in parallel with notebooks) ──────
  build-theme:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: myst-theme/package-lock.json

    - name: Build myst-theme
      run: |
        cd myst-theme
        npm ci
        npm run build
        cd themes/book
        npm run prod:build

    - name: Upload built theme
      uses: actions/upload-artifact@v4
      with:
        name: myst-theme-build
        path: myst-theme/
        retention-days: 1

  # ── Job 2: Build PDFs (needs notebooks + theme) ─────────────────────
  build-pdfs:
    needs: [execute-notebooks, build-theme]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Download executed notebooks
      uses: actions/download-artifact@v4
      with:
        name: executed-notebooks
        path: notebooks/

    - name: Download built theme
      uses: actions/download-artifact@v4
      with:
        name: myst-theme-build
        path: myst-theme/

    - name: Fix esbuild permissions
      run: |
        find myst-theme -name "esbuild" -type f -exec chmod +x {} \;
        find myst-theme -name "*.node" -type f -exec chmod +x {} \;

    - name: Cache PDF exports
      uses: actions/cache@v4
      id: pdf-cache
      with:
        path: |
          exports/
          */exports/
        key: pdfs-${{ hashFiles('**/*.md', 'myst.yml', '_templates/**', 'notebooks/**/*.ipynb') }}

    - name: Set up Python
      if: steps.pdf-cache.outputs.cache-hit != 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      if: steps.pdf-cache.outputs.cache-hit != 'true'
      run: pip install -r requirements.txt

    - name: Install LaTeX
      if: steps.pdf-cache.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-science texlive-xetex latexmk librsvg2-bin imagemagick
        sudo sed -i 's/rights="none" pattern="SVG"/rights="read|write" pattern="SVG"/' /etc/ImageMagick-6/policy.xml || true
        sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true

    - name: Build PDFs
      if: steps.pdf-cache.outputs.cache-hit != 'true'
      timeout-minutes: 20
      run: |
        jupyter-book build --pdf --execute

    - name: Upload PDF exports
      uses: actions/upload-artifact@v4
      with:
        name: pdf-exports
        path: |
          exports/
          */exports/
        retention-days: 1

  # ── Job 3: Build HTML + Deploy (needs notebooks + theme + PDFs) ─────
  build-html-deploy:
    needs: [execute-notebooks, build-theme, build-pdfs]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Download executed notebooks
      uses: actions/download-artifact@v4
      with:
        name: executed-notebooks
        path: notebooks/

    - name: Download built theme
      uses: actions/download-artifact@v4
      with:
        name: myst-theme-build
        path: myst-theme/

    - name: Fix esbuild permissions
      run: |
        find myst-theme -name "esbuild" -type f -exec chmod +x {} \;
        find myst-theme -name "*.node" -type f -exec chmod +x {} \;

    - name: Download PDF exports
      uses: actions/download-artifact@v4
      with:
        name: pdf-exports
        path: .

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Build the book
      timeout-minutes: 45
      run: |
        jupyter-book build --html --execute

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: './_build/html'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
